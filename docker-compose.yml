name: "freetalon"
services:
  ollama:
    image: "ollama/ollama:latest@sha256:f1a705f2bd113fb8d15f85f7c217f0dc5f6bebda6b0cc42b82c3ad165ffcb9dc"
    ports:
      - "11434:11434"
    volumes:
      - "ollama-models:/root/.ollama"
      - "${LOCAL_WORKSPACE}:/workspace"
    networks:
      - "back-tier"
      - "freetalon-claw-net"
  media-claw:
    image: "trusted-python-base:1.0.0"
    networks:
      - "freetalon-claw-net"
    read_only: false
    volumes:
      - "${LOCAL_WORKSPACE}/output:/workspace/output:rw"
    deploy:
      resources:
        limits:
          memory: "8g"
          cpus: "4.0"
    profiles:
      - "media"
  upload-claw:
    image: "trusted-python-base:1.0.0"
    networks:
      - "freetalon-upload-net"
    read_only: false
    volumes:
      - "${LOCAL_WORKSPACE}/output:/workspace/output:rw"
    deploy:
      resources:
        limits:
          memory: "8g"
          cpus: "4.0"
    profiles:
      - "upload"
  browser-claw:
    image: "freetalon-claw-browser:1.0.0"
    networks:
      - "freetalon-browser-net"
    volumes:
      - "${LOCAL_WORKSPACE}/screenshots:/screenshots:rw"
    environment:
      SCREENSHOTS_DIR: "/screenshots"
      CLAW_PORT: "8080"
    deploy:
      resources:
        limits:
          memory: "512m"
          cpus: "0.5"
    profiles:
      - "browser"
networks:
  back-tier:
    driver: "bridge"
    labels:
      freetalon.tier: "back"
  freetalon-claw-net:
    driver: "bridge"
    internal: true
  freetalon-browser-net:
    driver: "bridge"
  freetalon-upload-net:
    driver: "bridge"
volumes:
  ollama-models:
    name: "freetalon-ollama-models"
