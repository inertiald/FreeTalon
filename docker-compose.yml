# docker-compose.yml — FreeTalon reference stack.
#
# Generated from the installer's CPU-only template with all claw profiles.
# Adjust GPU settings via `python installer.py` or manually edit the
# 'ollama' service below.
#
# Profiles:
#   docker compose up                  → ollama only
#   docker compose --profile media up  → + media-claw
#   docker compose --profile upload up → + upload-claw
#   docker compose --profile browser up→ + browser-claw

services:
  # -- LLM backend --------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - "${LOCAL_WORKSPACE}:/workspace"
    networks:
      - back-tier
      - freetalon-claw-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # -- Hub (orchestrator) —- spawns sibling claw containers ---------------
  # Mounts the Docker socket so the Hub can call the Docker API directly
  # and launch/manage sibling containers at runtime.  Stays on back-tier
  # to communicate with Ollama but has no sandbox-tier exposure.
  decapod-hub:
    image: trusted-python-base
    networks:
      - back-tier
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      OLLAMA_HOST: "http://ollama:11434"
    restart: unless-stopped

  # -- Media Claw (video tasks) -------------------------------------------
  # Up to 8 GiB RAM / 4 CPU cores.  /workspace/output is RW so the claw
  # can persist rendered media files back to the host.
  media-claw:
    image: trusted-python-base
    networks:
      - freetalon-claw-net
    read_only: false
    volumes:
      - "${LOCAL_WORKSPACE}/output:/workspace/output:rw"
    deploy:
      resources:
        limits:
          memory: "8g"
          cpus: "4.0"
    profiles:
      - media

  # -- Upload Claw (YouTube upload) ----------------------------------------
  # Same compute budget as media-claw but on a non-internal bridge so the
  # container can reach the YouTube API over the public internet.
  upload-claw:
    image: trusted-python-base
    networks:
      - freetalon-upload-net
    read_only: false
    volumes:
      - "${LOCAL_WORKSPACE}/output:/workspace/output:rw"
    deploy:
      resources:
        limits:
          memory: "8g"
          cpus: "4.0"
    profiles:
      - upload

  # -- Browser Claw --------------------------------------------------------
  browser-claw:
    image: freetalon-claw-browser
    networks:
      - freetalon-browser-net
    volumes:
      - "${LOCAL_WORKSPACE}/screenshots:/screenshots:rw"
    environment:
      SCREENSHOTS_DIR: /screenshots
      CLAW_PORT: "8080"
    deploy:
      resources:
        limits:
          memory: "512m"
          cpus: "0.5"
    profiles:
      - browser

# -- Networks --------------------------------------------------------------
networks:
  # Back-tier: internal bridge for AI logic (Hub ↔ Ollama, Hub ↔ claws).
  # Not marked internal=true so the Hub can pull models on first startup,
  # but all claw workloads stay on freetalon-claw-net or sandbox-tier.
  back-tier:
    driver: bridge

  # Sandbox-tier: fully air-gapped — no external gateway.
  # Default claw containers (spawn_claw) attach here for zero-internet
  # isolation.  To enable proxy egress for a specific service set the
  # HTTP_PROXY / HTTPS_PROXY environment variables on that service; the
  # network itself never gains a default gateway.
  sandbox-tier:
    driver: bridge
    internal: true

  # Internal-only bridge — claws can reach the LLM but NOT the internet.
  freetalon-claw-net:
    driver: bridge
    internal: true

  # Browser claws need outbound internet access for web navigation.
  freetalon-browser-net:
    driver: bridge

  # Upload claws need outbound internet access for YouTube API.
  freetalon-upload-net:
    driver: bridge
