# docker-compose.yml — FreeTalon hybrid reference stack.
#
# Reconciles the two unmerged compose design branches by combining:
# - zero-trust network tiering (`back-tier`, `sandbox-tier`) and
#   conservative local-first defaults
# - broader profile-based claw service coverage (media/upload/browser)
#
# This file remains conservative with ADR 0001:
# existing Docker-oriented modules are kept available, while the local
# API runtime remains the primary execution path. A dedicated hub service
# is intentionally not enabled here because it is not yet integrated with
# the current local runtime.
#
# Profiles:
#   docker compose up                  → ollama only
#   docker compose --profile media up  → + media-claw
#   docker compose --profile upload up → + upload-claw
#   docker compose --profile browser up→ + browser-claw

name: freetalon

services:
  # -- LLM backend --------------------------------------------------------
  ollama:
    image: ollama/ollama:latest@sha256:f1a705f2bd113fb8d15f85f7c217f0dc5f6bebda6b0cc42b82c3ad165ffcb9dc
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
      - "${LOCAL_WORKSPACE}:/workspace"
    networks:
      - back-tier
      - freetalon-claw-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # -- Media Claw (video tasks) -------------------------------------------
  # Up to 8 GiB RAM / 4 CPU cores.  /workspace/output is RW so the claw
  # can persist rendered media files back to the host.
  media-claw:
    image: trusted-python-base:1.0.0
    networks:
      - freetalon-claw-net
    read_only: false
    volumes:
      - "${LOCAL_WORKSPACE}/output:/workspace/output:rw"
    deploy:
      resources:
        limits:
          memory: "8g"
          cpus: "4.0"
    profiles:
      - media

  # -- Upload Claw (YouTube upload) ----------------------------------------
  # Same compute budget as media-claw but on a non-internal bridge so the
  # container can reach the YouTube API over the public internet.
  upload-claw:
    image: trusted-python-base:1.0.0
    networks:
      - freetalon-upload-net
    read_only: false
    volumes:
      - "${LOCAL_WORKSPACE}/output:/workspace/output:rw"
    deploy:
      resources:
        limits:
          memory: "8g"
          cpus: "4.0"
    profiles:
      - upload

  # -- Browser Claw --------------------------------------------------------
  browser-claw:
    image: freetalon-claw-browser:1.0.0
    networks:
      - freetalon-browser-net
    volumes:
      - "${LOCAL_WORKSPACE}/screenshots:/screenshots:rw"
    environment:
      SCREENSHOTS_DIR: /screenshots
      CLAW_PORT: "8080"
    deploy:
      resources:
        limits:
          memory: "512m"
          cpus: "0.5"
    profiles:
      - browser

# -- Networks --------------------------------------------------------------
networks:
  # Trusted AI back-tier (future hub/orchestrator <-> ollama path).
  back-tier:
    driver: bridge
    attachable: true
    labels:
      freetalon.tier: back

  # Reserved sandbox tier for explicit zero-egress claw isolation.
  # Kept for reference compatibility with earlier compose proposals.
  sandbox-tier:
    driver: bridge
    internal: true
    attachable: true
    labels:
      freetalon.tier: sandbox

  # Internal-only bridge — claws can reach the LLM but NOT the internet.
  # Current Docker manager code paths still target this network name.
  freetalon-claw-net:
    driver: bridge
    internal: true

  # Browser claws need outbound internet access for web navigation.
  freetalon-browser-net:
    driver: bridge

  # Upload claws need outbound internet access for YouTube API.
  freetalon-upload-net:
    driver: bridge

# -- Volumes ---------------------------------------------------------------
volumes:
  # Durable model cache to avoid re-pulling Ollama weights.
  ollama-models:
    name: freetalon-ollama-models
    labels:
      freetalon.role: llm-weights
